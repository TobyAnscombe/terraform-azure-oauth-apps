name: Terraform

on:
  push:
    branches: [main, sandpit]
  pull_request:
    branches: [main, sandpit]

permissions:
  id-token: write       # required for OIDC login to Azure
  contents: read
  pull-requests: write
  security-events: write
  administration: write

env:
  ARM_CLIENT_ID:        ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:        ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID:  ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC:         "true"
  # CyberArk — non-sensitive values as repo variables, secret via Actions secret
  TF_VAR_cyberark_tenant:             ${{ vars.CYBERARK_TENANT }}
  TF_VAR_cyberark_domain:             ${{ vars.CYBERARK_DOMAIN }}
  TF_VAR_cyberark_client_id:          ${{ vars.CYBERARK_CLIENT_ID }}
  TF_VAR_cyberark_cpm_user:           ${{ vars.CYBERARK_CPM_USER }}
  TF_VAR_cyberark_azure_platform_id:  ${{ vars.CYBERARK_AZURE_PLATFORM_ID }}
  TF_VAR_cyberark_client_secret:      ${{ secrets.CYBERARK_CLIENT_SECRET }}

jobs:
  secret-scan:
    uses: TobyAnscombe/github-actions/.github/workflows/gitleaks.yml@main

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform Init (providers only, skip state backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint --format compact

  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    needs: [secret-scan, validate]
    environment: ${{ github.ref_name == 'main' && 'prod' || 'sandpit' }}

    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ github.ref_name == 'main' && 'prod' || 'sandpit' }}.tfvars" \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name: Post Snowflake SQL to summary
        if: github.event_name == 'push'
        run: |
          echo "## Snowflake Security Integration SQL" >> $GITHUB_STEP_SUMMARY
          echo '```sql' >> $GITHUB_STEP_SUMMARY
          terraform output -raw snowflake_security_integration_sql >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  protect-main:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [secret-scan, validate]
    uses: TobyAnscombe/github-actions/.github/workflows/branch-protection.yml@main
    permissions:
      administration: write
    with:
      required_checks: '["secret-scan / Scan for secrets"]'
